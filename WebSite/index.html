<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCKY!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg class="bg-ribbon" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <radialGradient id="planetGrad" cx="40%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#ffcc44"/>
                <stop offset="40%" stop-color="#ff7700"/>
                <stop offset="100%" stop-color="#cc2200"/>
            </radialGradient>
            <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#e040fb" stop-opacity="0.9"/>
                <stop offset="50%" stop-color="#b470fa" stop-opacity="0.85"/>
                <stop offset="100%" stop-color="#f472b6" stop-opacity="0.9"/>
            </linearGradient>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="8" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
        <path d="M -50 620 C 100 420, 250 680, 450 440 S 750 180, 950 380 S 1150 430, 1300 330"
              stroke="url(#ribbonGrad)" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.2"/>
        <path d="M -50 620 C 100 420, 250 680, 450 440 S 750 180, 950 380 S 1150 430, 1300 330"
              stroke="url(#ribbonGrad)" stroke-width="28" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
        <path d="M -50 620 C 100 420, 250 680, 450 440 S 750 180, 950 380 S 1150 430, 1300 330"
              stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
        <circle cx="100" cy="490" r="2.5" fill="white" opacity="0.8"/>
        <circle cx="270" cy="608" r="3.5" fill="white" opacity="0.75"/>
        <circle cx="270" cy="608" r="8" fill="#e879f9" opacity="0.3"/>
        <circle cx="450" cy="440" r="2" fill="white" opacity="0.9"/>
        <circle cx="580" cy="335" r="4" fill="white" opacity="0.7"/>
        <circle cx="580" cy="335" r="9" fill="#c084fc" opacity="0.22"/>
        <circle cx="720" cy="205" r="2.5" fill="white" opacity="0.85"/>
        <circle cx="830" cy="188" r="4" fill="white" opacity="0.8"/>
        <circle cx="830" cy="188" r="9" fill="#f0abfc" opacity="0.28"/>
        <circle cx="1000" cy="385" r="2.5" fill="white" opacity="0.7"/>
        <circle cx="1150" cy="418" r="3" fill="white" opacity="0.75"/>
        <circle cx="1150" cy="418" r="7" fill="#e879f9" opacity="0.25"/>
        <circle cx="1120" cy="760" r="220" fill="url(#planetGrad)" opacity="0.92"/>
    </svg>

    <div class="container">
        <div class="header">
            <h1>ROCKY!</h1>
            <p>Мултифункционална хоби ракета</p>
        </div>

        <div class="cards-grid">
            <div class="card">
                <div><i class="fas fa-thermometer-half"></i> Температура</div>
                <div class="value" id="t-val">--</div><span>°C</span>
            </div>
            <div class="card">
                <div><i class="fas fa-tachometer-alt"></i> Налягане</div>
                <div class="value" id="p-val">--</div><span>hPa</span>
            </div>
            <div class="card">
                <div><i class="fas fa-ruler-vertical"></i> Височина</div>
                <div class="value" id="alt-val">--</div><span>m</span>
            </div>
            <div class="card">
                <div><i class="fas fa-rocket"></i> Ускорение</div>
                <div class="value" id="acc-val">--</div><span>m/s²</span>
            </div>
            <div class="card">
                <div><i class="fas fa-sync-alt"></i> Жироскоп X</div>
                <div class="value" id="gyr-val">--</div><span>°/s</span>
            </div>
            <div class="card">
                <div><i class="fas fa-wind"></i> Скорост</div>
                <div class="value" id="spd-val">--</div><span>km/h</span>
            </div>
        </div>

        <span id="lat-val" hidden></span>
        <span id="lng-val" hidden></span>

        <div id="map-section">
            <div class="map-header">
                <div class="map-label"><i class="fas fa-map"></i> Траектория</div>
                <div class="map-sat"><i class="fas fa-satellite"></i> <span id="sat-val">--</span> сателити</div>
            </div>
            <div id="map"></div>
            <div id="map-coords">Изчакване на GPS сигнал…</div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMed9K96VmeEi9HIaPfRF0ZDklQYqTZow",
            databaseURL: "https://rocky-e02f5-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ── Map setup ──
        const map = L.map('map', {
            center: [42.7, 23.3],
            zoom: 13,
            zoomControl: true,
            attributionControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const rocketIcon = L.divIcon({
            html: '<div class="rocket-marker">🚀</div>',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            className: ''
        });

        let marker = null;
        let polyline = L.polyline([], { color: '#e040fb', weight: 2.5, opacity: 0.75 }).addTo(map);
        let trackPoints = [];
        let hasSnapped = false;

        // ── Firebase real-time listener ──
        onValue(ref(db, "sensor"), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('t-val').textContent   = data.temp         ?? '--';
            document.getElementById('p-val').textContent   = data.pressure     ?? '--';
            document.getElementById('alt-val').textContent = data.altitude     ?? '--';
            document.getElementById('acc-val').textContent = data.acceleration ?? '--';
            document.getElementById('gyr-val').textContent = data.gyro         ?? '--';
            document.getElementById('lat-val').textContent = data.lat          ?? '--';
            document.getElementById('lng-val').textContent = data.lng          ?? '--';
            document.getElementById('spd-val').textContent = data.speed        ?? '--';
            document.getElementById('sat-val').textContent = data.satellites   ?? '--';

            const lat = parseFloat(data.lat);
            const lng = parseFloat(data.lng);

            if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
                const pos = [lat, lng];

                if (!marker) {
                    marker = L.marker(pos, { icon: rocketIcon }).addTo(map);
                } else {
                    marker.setLatLng(pos);
                }

                trackPoints.push(pos);
                polyline.setLatLngs(trackPoints);

                if (!hasSnapped) {
                    map.setView(pos, 15);
                    hasSnapped = true;
                }

                document.getElementById('map-coords').textContent =
                    `${lat.toFixed(6)}°, ${lng.toFixed(6)}°  ·  ${data.satellites ?? '--'} сателита`;
            }
        });
    </script>
</body>
</html>
